<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive</title>
  <link rel="manifest" href="/public/manifest.json">
  <meta name="theme-color" content="#111111">
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
    .container { width: 100%; max-width: 640px; text-align: center; }
    video, audio { width: 100%; margin-bottom: 25px; border-radius: 8px; background: #000; }
    h2 { font-size: 1.2rem; color: #aaa; text-align: left; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Archive</h1>

    <h2>Video Player (MP4)</h2>
    <video controls crossorigin="anonymous">
      <source src="/public/video.mp4" type="video/mp4">
      Your browser does not support video.
    </video>

    <h2>Audio Player (MP3)</h2>
    <audio controls crossorigin="anonymous">
      <source src="/public/audio.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>
  </div>

  <script>
    // Register PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/public/sw.js')
          .then(() => console.log('Service Worker Active'))
          .catch(err => console.error('SW Error:', err));
      });
    }
  </script>
</body>
</html>
